name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4

      - run: pnpm install

      - name: Lint
        run: pnpm exec oxlint -c .oxlintrc.json core/src/ cli/src/ durable-streams/ durable-effects/ runtime/

      - name: Format
        run: pnpm exec oxfmt --check core/src/ cli/src/ durable-streams/ durable-effects/ runtime/ vendor/ test-support/

  test-deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2.0.3
        with:
          deno-version: v2.9.1

      - name: Typecheck
        run: deno task check

      - name: Publish workflow is generated from manifests
        run: |
          deno task gen:publish-workflow
          git diff --exit-code .github/workflows/publish-packages.yml \
            || { echo "::error::publish-packages.yml is out of date — run 'deno task gen:publish-workflow' and commit the result"; exit 1; }

      - name: Test
        run: deno task test

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2.0.3
        with:
          deno-version: v2.9.1

      - name: Install workspace deps
        run: deno install

      - name: Check (fmt + lint + typecheck)
        run: deno task check
        working-directory: site

      - name: Production build (clean runner)
        run: deno task build
        working-directory: site

  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4

      - run: pnpm install

      - name: Typecheck
        run: pnpm exec tsc --project tsconfig.node.json --noEmit

      - name: Test
        run: pnpm test:node

  test-bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Test
        run: bun run test:bun
