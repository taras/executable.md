name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2.0.3
        with:
          deno-version: v2.x

      - name: Lint
        run: deno task lint

      - name: Typecheck
        run: deno task check

      - name: Test
        run: deno task test

  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4

      - run: pnpm install

      - name: Typecheck
        run: pnpm exec tsc --project tsconfig.node.json --noEmit

      - name: Test
        run: pnpm test:node

  test-bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Test
        run: bun run test:bun
