name: Publish one package

# Reusable: build one @executablemd workspace member with dnt and publish it to
# npm (OIDC) and JSR (best-effort). publish-packages.yml calls this once per
# package and orders the calls with `needs:`.

on:
  workflow_call:
    inputs:
      package:
        description: "Workspace member directory (e.g. core, packages/code-review-agent)"
        required: true
        type: string
      version:
        description: "Version to publish"
        required: true
        type: string

permissions:
  contents: read
  id-token: write # npm OIDC trusted publishing + JSR OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    # Environment protection rules (required reviewers, v* tag-only deployment
    # rule) gate every publish; the npm trusted publisher is also bound to this
    # environment name, so npm rejects OIDC tokens minted outside it.
    environment: npm-publish
    env:
      # @effectionx/* peer-depend on effection `^3 || ^4`, which npm won't match
      # against the pinned 4.x prerelease during dnt's install step.
      NPM_CONFIG_LEGACY_PEER_DEPS: "true"
    steps:
      # Reusable workflows run at the caller's commit, so the default checkout
      # ref (github.sha) is the tag's commit on a tag push and the dispatched
      # branch's HEAD on a manual run — no explicit ref needed.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: v2.9.1

      # Node 24 ships npm >= 11.5, required for OIDC trusted publishing to npm.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Build with dnt
        # Retry to absorb npm propagation of a just-published sibling dependency.
        run: |
          set -eu
          for attempt in 1 2 3 4; do
            if deno run -A scripts/build-npm.ts "${{ inputs.package }}" "${{ inputs.version }}"; then
              exit 0
            fi
            [ "$attempt" -lt 4 ] && sleep 15 || true
          done
          echo "build failed after 4 attempts" >&2
          exit 1

      # Skip an already-published version so re-running a tag's workflow (or
      # tagging a version that was hand-bootstrapped) is idempotent instead of
      # failing on npm's no-republish rule.
      - name: Publish to npm
        working-directory: ${{ inputs.package }}/npm
        run: |
          NAME="$(node -p "require('./package.json').name")"
          if npm view "$NAME@${{ inputs.version }}" version >/dev/null 2>&1; then
            echo "$NAME@${{ inputs.version }} is already on npm — skipping"
          else
            npm publish --access public
          fi

      - name: Publish to JSR (best-effort)
        run: deno publish --allow-dirty || echo "JSR publish skipped/failed (secondary registry)"
        working-directory: ${{ inputs.package }}
