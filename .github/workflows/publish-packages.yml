name: Publish packages

# Publishes every @executablemd library package to npm (primary) and JSR
# (secondary). Runs on the same `v*` tag that drives release.yml, so a single
# tag ships the binary and the packages together.
#
# Packages are built and published in dependency order (leaves first) so that
# when a downstream package builds, dnt resolves its siblings from the registry
# instead of inlining them.
#
# Prerequisites (one-time):
#   - NPM_TOKEN repo secret with publish rights to the @executablemd npm scope.
#   - The @executablemd JSR scope + packages created and linked to this repo
#     (JSR publish is best-effort; failures do not block the npm publish).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.0)"
        required: true

permissions:
  contents: read
  id-token: write # JSR OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # @effectionx/* declare `peer effection@"^3 || ^4"`, which npm does not
      # match against the pinned 4.x prerelease. Mirror the repo's pnpm
      # strict-peer-dependencies=false for npm during dnt's install step.
      NPM_CONFIG_LEGACY_PEER_DEPS: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.value }}"

          pkg_dir() {
            case "$1" in
              code-review-agent) echo "packages/code-review-agent/npm" ;;
              *) echo "$1/npm" ;;
            esac
          }

          # Build (with retries for registry propagation of freshly published
          # siblings) then publish, one package at a time in dependency order.
          for pkg in durable-streams runtime code-review-agent core cli; do
            echo "::group::npm $pkg@$VERSION"
            n=0
            until deno run -A scripts/build-npm.ts "$pkg" "$VERSION"; do
              n=$((n + 1))
              if [ "$n" -ge 4 ]; then
                echo "build failed for $pkg after $n attempts" >&2
                exit 1
              fi
              echo "build $pkg failed (attempt $n) — retrying in 15s (sibling propagation?)"
              sleep 15
            done
            ( cd "$(pkg_dir "$pkg")" && npm publish --access public )
            echo "::endgroup::"
          done

      - name: Publish to JSR (best-effort)
        run: |
          set -uo pipefail
          for pkg in durable-streams runtime code-review-agent core cli; do
            case "$pkg" in
              code-review-agent) dir="packages/code-review-agent" ;;
              *) dir="$pkg" ;;
            esac
            echo "::group::jsr $pkg"
            # --allow-dirty: the npm build step above leaves gitignored npm/
            # output in the tree. JSR is secondary; a failure (e.g. slow types
            # on core/cli, or an unlinked scope) must not fail the workflow.
            ( cd "$dir" && deno publish --allow-dirty ) \
              || echo "JSR publish skipped/failed for $pkg (secondary registry) — continuing"
            echo "::endgroup::"
          done
