name: Publish packages

# One tag ships everything: release.yml builds the binary; this workflow fans
# out one publish-one.yml run per @executablemd package, ordered with `needs:`
# so dependencies publish before dependents (leaves run in parallel).
#
# Prerequisites (one-time):
#   - npm: configure an OIDC trusted publisher for each @executablemd package
#     pointing at this repo + publish-one.yml, so no npm token is needed.
#   - JSR: create/link the @executablemd packages to this repo (JSR publish is
#     best-effort; failures do not fail the run).
#
# Note for consumers: core/runtime/cli depend on effection's 4.x prerelease,
# which npm's peer resolver rejects against @effectionx/* (`^3 || ^4`). Until
# effection 4 is stable, installing those packages needs `--legacy-peer-deps`.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.0)"
        required: true

permissions:
  contents: read
  id-token: write # granted to the reusable publish-one.yml jobs for OIDC

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      value: ${{ steps.resolve.outputs.value }}
    steps:
      - id: resolve
        run: |
          echo "ref=${{ github.event.inputs.tag || github.ref }}" >> "$GITHUB_OUTPUT"
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"

  durable-streams:
    needs: version
    uses: ./.github/workflows/publish-one.yml
    with:
      package: durable-streams
      version: ${{ needs.version.outputs.value }}
      ref: ${{ needs.version.outputs.ref }}

  runtime:
    needs: version
    uses: ./.github/workflows/publish-one.yml
    with:
      package: runtime
      version: ${{ needs.version.outputs.value }}
      ref: ${{ needs.version.outputs.ref }}

  code-review-agent:
    needs: version
    uses: ./.github/workflows/publish-one.yml
    with:
      package: packages/code-review-agent
      version: ${{ needs.version.outputs.value }}
      ref: ${{ needs.version.outputs.ref }}

  core:
    needs: [version, durable-streams, runtime]
    uses: ./.github/workflows/publish-one.yml
    with:
      package: core
      version: ${{ needs.version.outputs.value }}
      ref: ${{ needs.version.outputs.ref }}

  cli:
    needs: [version, core, durable-streams]
    uses: ./.github/workflows/publish-one.yml
    with:
      package: cli
      version: ${{ needs.version.outputs.value }}
      ref: ${{ needs.version.outputs.ref }}
