name: Publish packages

# Publishes every @executablemd library to npm (primary) and JSR (secondary) on
# the same `v*` tag that drives release.yml, so one tag ships the binary and the
# packages together. Build/publish orchestration lives in
# scripts/publish-packages.ts (packages + order derived from the manifests).
#
# Prerequisites (one-time):
#   - npm: configure a trusted publisher (OIDC) for each @executablemd package
#     pointing at this repo + this workflow, so no npm token is needed.
#   - JSR: create/link the @executablemd packages to this repo (JSR publish is
#     best-effort; failures do not fail the run).
#
# Note for consumers: core/runtime/cli depend on effection's 4.x prerelease,
# which npm's peer resolver rejects against @effectionx/* (`^3 || ^4`). Until
# effection 4 is stable, installing those packages needs `--legacy-peer-deps`.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.0)"
        required: true

permissions:
  contents: read
  id-token: write # npm OIDC trusted publishing + JSR OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # @effectionx/* peer-depend on effection `^3 || ^4`, which npm won't match
      # against the pinned 4.x prerelease during dnt's install step.
      NPM_CONFIG_LEGACY_PEER_DEPS: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.1

      # Node 24 ships npm >= 11.5, required for OIDC trusted publishing to npm.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and publish (npm + JSR)
        run: deno run -A scripts/publish-packages.ts "${{ steps.version.outputs.value }}"
