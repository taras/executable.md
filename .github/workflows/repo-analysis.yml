name: Repo Analysis

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to analyze
        required: true
        default: main
      report_name:
        description: Optional report label prefix
        required: false
        default: repo-analysis

concurrency:
  group: repo-analysis-${{ inputs.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      # Version-pinned so a new (or compromised) release cannot silently change
      # analysis behavior; bump the pin as part of each release.
      - name: Install xmd release binary
        run: |
          curl -fsSL https://executable.md/install.sh | XMD_VERSION=v0.3.1 sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run repo analysis
        env:
          DEEPINFRA_TOKEN: ${{ secrets.DEEPINFRA_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          xmd run .reviews/AnalyzeRepoCI.md \
            --component-dir .reviews/components \
            --component-dir .reviews/policies \
            --component-dir core/components \
            -j .reviews/journal.analyze.ci.jsonl > .reviews/analyze-report.md

      # xmd embeds a failed EnsureOxlint as a comment and still exits 0, so
      # assert the lint binaries were provisioned — fail the job if not.
      - name: Verify oxlint provisioning
        run: |
          test -x .reviews/.oxlint/oxlint && test -x .reviews/.oxlint/tsgolint \
            || { echo "::error::oxlint/tsgolint could not be provisioned by EnsureOxlint"; exit 1; }

      - name: Write run metadata
        if: always()
        run: |
          mkdir -p .reviews
          cat > .reviews/analyze-run.json <<'JSON'
          {
            "workflow": "repo-analysis.yml",
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "run_attempt": "${{ github.run_attempt }}",
            "sha": "${{ github.sha }}",
            "ref": "${{ inputs.ref }}",
            "report_name": "${{ inputs.report_name }}"
          }
          JSON

      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.report_name }}-${{ github.sha }}
          path: |
            .reviews/analyze-report.md
            .reviews/journal.analyze.ci.jsonl
            .reviews/analyze-run.json
          retention-days: 30
